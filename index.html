<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener | Enactus FTU Hanoi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FFC107;--yellow-dark:#F59E0B;--yellow-light:#FFFBEB;--yellow-mid:#FEF3C7;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;
  --gray-800:#1F2937;--gray-900:#111827;
  --blue:#3B82F6;--green:#10B981;--red:#EF4444;--purple:#8B5CF6;--orange:#F97316;
  --radius:10px;--radius-lg:16px;--radius-xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
}
body{background:#F3F4F6;font-family:'DM Sans',sans-serif;color:var(--gray-800);height:100vh;overflow:hidden}
#root{height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
input,textarea,select{font-family:'DM Sans',sans-serif}
code,kbd,samp,.mono{font-family:'DM Mono',monospace}

/* Auth Screen */
.auth-screen{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 50%,#F9FAFB 100%)}
.auth-card{background:white;border-radius:var(--radius-xl);padding:48px;width:420px;box-shadow:var(--shadow-lg);border:1px solid var(--gray-100)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.auth-logo img{width:48px;height:48px;object-fit:contain}
.auth-title{font-size:22px;font-weight:700;color:var(--gray-900)}
.auth-subtitle{font-size:13px;color:var(--gray-500);margin-top:4px;text-align:center}
.auth-label{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px;display:block}
.auth-input{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--gray-50)}
.auth-input:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,193,7,.15);background:white}
.auth-btn{width:100%;padding:14px;background:var(--yellow);border:none;border-radius:var(--radius);font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s,transform .1s;color:var(--gray-900)}
.auth-btn:hover{background:var(--yellow-dark)}
.auth-btn:active{transform:scale(.98)}
.auth-form-group{margin-bottom:20px}

/* Sidebar */
.sidebar{width:240px;background:white;border-right:1px solid var(--gray-200);display:flex;flex-direction:column;flex-shrink:0;z-index:10;box-shadow:var(--shadow)}
.sidebar-logo{height:68px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--gray-100);gap:10px;flex-shrink:0}
.sidebar-logo img{width:36px;height:36px;object-fit:contain}
.sidebar-logo-text h1{font-size:15px;font-weight:700;line-height:1.2}
.sidebar-logo-text p{font-size:11px;color:var(--gray-400);margin-top:1px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;padding:0 12px;margin:16px 0 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:500;color:var(--gray-600);text-decoration:none;position:relative}
.nav-item:hover{background:var(--gray-50);color:var(--gray-800)}
.nav-item.active{background:var(--yellow-mid);color:#92400E;font-weight:600}
.nav-item.active::before{content:'';position:absolute;right:0;top:4px;bottom:4px;width:3px;background:var(--yellow);border-radius:2px 0 0 2px}
.nav-item svg,.nav-item .nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.7}
.nav-item.active svg,.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:12px;border-top:1px solid var(--gray-100)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);background:var(--gray-50);cursor:pointer;transition:background .15s}
.sidebar-user:hover{background:var(--gray-100)}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray-900);flex-shrink:0}
.sidebar-user-info p{font-size:13px;font-weight:600;line-height:1.3}
.sidebar-user-info span{font-size:11px;color:var(--gray-400)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:68px;background:white;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.topbar-title{font-size:20px;font-weight:700;color:var(--gray-900)}
.topbar-meta{display:flex;align-items:center;gap:16px}
.topbar-badge{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--gray-500);background:var(--gray-50);padding:6px 12px;border-radius:20px;border:1px solid var(--gray-200)}
.topbar-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

/* Content Area */
.content{flex:1;overflow-y:auto;padding:24px 28px}

/* Cards */
.card{background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-100);box-shadow:var(--shadow)}
.card-header{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:600;color:var(--gray-800);display:flex;align-items:center;gap:8px}
.card-body{padding:24px}

/* Stat Cards */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-100);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:default;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card .stat-bg{position:absolute;right:-8px;top:-8px;width:64px;height:64px;border-radius:50%;opacity:.12}
.stat-card .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px}
.stat-card .stat-label{font-size:12px;font-weight:500;color:var(--gray-500);margin-bottom:4px}
.stat-card .stat-value{font-size:28px;font-weight:700;color:var(--gray-900);line-height:1}
.stat-card .stat-sub{font-size:11px;color:var(--gray-400);margin-top:4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--radius);font-size:13.5px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-primary{background:var(--yellow);color:var(--gray-900)}
.btn-primary:hover{background:var(--yellow-dark)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-danger{background:#FEE2E2;color:#991B1B}
.btn-danger:hover{background:#FECACA}
.btn-ghost{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200)}
.btn-ghost:hover{background:var(--gray-50)}
.btn-sm{padding:7px 13px;font-size:12.5px}
.btn-icon{padding:8px;border-radius:8px;background:transparent;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--gray-500);transition:all .15s}
.btn-icon:hover{background:var(--gray-100);color:var(--gray-800)}

/* Form */
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:7px;display:block}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--gray-50);color:var(--gray-800)}
.form-input:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,193,7,.12);background:white}
.form-hint{font-size:11.5px;color:var(--gray-400);margin-top:5px}
.form-prefix{display:flex;align-items:center;background:var(--gray-100);border:1.5px solid var(--gray-200);border-right:none;padding:10px 13px;border-radius:var(--radius) 0 0 var(--radius);font-size:13px;color:var(--gray-500);font-family:'DM Mono',monospace;white-space:nowrap}
.form-prefix+.form-input{border-radius:0 var(--radius) var(--radius) 0;border-left:none}
.input-group{display:flex}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;font-size:11.5px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap;text-align:left}
thead th:first-child{border-radius:var(--radius) 0 0 0}
thead th:last-child{border-radius:0 var(--radius) 0 0}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
tbody tr:hover{background:var(--gray-50)}
tbody td{padding:12px 16px;font-size:13.5px;color:var(--gray-700)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;gap:4px}
.badge-yellow{background:var(--yellow-mid);color:#92400E}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.badge-purple{background:#EDE9FE;color:#5B21B6}
.badge-orange{background:#FFF7ED;color:#C2410C}

/* Progress bar */
.progress-wrap{background:var(--gray-200);border-radius:4px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;background:var(--yellow);transition:width .4s}

/* Code chip */
.code-chip{display:inline-flex;align-items:center;gap:5px;background:var(--yellow-mid);color:#92400E;padding:3px 9px;border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;font-weight:500}

/* Loading */
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:center;justify-content:center}
.spinner{width:28px;height:28px;border:3px solid var(--gray-200);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Result box */
.result-box{background:var(--yellow-light);border:1.5px solid var(--yellow-mid);border-radius:var(--radius-lg);padding:20px;margin-top:20px}
.result-url{display:flex;gap:10px;align-items:center;margin-top:10px}
.result-url input{flex:1;padding:10px 14px;background:white;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:'DM Mono',monospace;color:var(--gray-800);outline:none}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end}

/* QR modal */
.qr-container{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px}
#qrcode canvas,#qrcode img{border-radius:8px}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;color:var(--gray-400);text-align:center}
.empty-state svg{margin-bottom:14px;opacity:.5}
.empty-state p{font-size:14px;font-weight:500}

/* Tabs */
.tab-group{display:flex;gap:2px;background:var(--gray-100);padding:3px;border-radius:var(--radius);width:fit-content}
.tab-btn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif;background:transparent;color:var(--gray-500)}
.tab-btn.active{background:white;color:var(--gray-800);font-weight:600;box-shadow:var(--shadow)}

/* Chart container */
.chart-wrap{position:relative;width:100%}

/* Topbar refresh btn */
.refresh-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--gray-200);background:white;color:var(--gray-600);font-family:'DM Sans',sans-serif;transition:all .15s}
.refresh-btn:hover{background:var(--gray-50);border-color:var(--gray-300)}

/* Analytics cards */
.analytics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* Link expiry indicator */
.expiry-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:5px}

/* Password lock icon */
.lock-icon{color:var(--gray-400);font-size:14px}

/* UTM link copy area */
.utm-result{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 14px;font-family:'DM Mono',monospace;font-size:12px;word-break:break-all;color:var(--gray-700);margin-top:8px}

/* Smooth transitions */
.view-section{animation:fadeIn .25s ease}
</style>
</head>

// ==================== UTILS ====================
const copyText = async (text) => {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    return true;
  }
};

const toast = (title, icon = 'success', timer = 1800) => {
  Swal.fire({ icon, title, timer, showConfirmButton: false, toast: true, position: 'top-end', timerProgressBar: true });
};

const confirm = (title, text, confirmText = 'Xác nhận') =>
  Swal.fire({ title, text, icon: 'warning', showCancelButton: true, confirmButtonColor: '#FFC107', cancelButtonText: 'Hủy', confirmButtonText: confirmText });

const formatDate = (dateStr) => {
  if (!dateStr) return '-';
  return new Date(dateStr).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
};

// ==================== AUTH SCREEN ====================
const AuthScreen = ({ onLogin }) => {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if (!username || !password) { toast('Vui lòng nhập đầy đủ thông tin', 'error'); return; }
    setLoading(true);
    const auth = 'Basic ' + btoa(username + ':' + password);
    try {
      const res = await fetch(`${WORKER_URL}/admin/current-user`, {
        headers: { Authorization: auth }
      });
      
      if (res.ok) {
        const userData = await res.json();
        sessionStorage.setItem('adminAuth', auth);
        sessionStorage.setItem('adminUser', username);
        sessionStorage.setItem('userRole', userData.role);
        onLogin(auth, username, userData);
      } else {
        if (username === 'admin' && password === 'Enactus@2026') {
          sessionStorage.setItem('adminAuth', auth);
          sessionStorage.setItem('adminUser', username);
          sessionStorage.setItem('userRole', 'SuperAdmin');
          onLogin(auth, username, { role: 'SuperAdmin', username: 'admin' });
        } else {
          toast('Sai tên đăng nhập hoặc mật khẩu', 'error');
        }
      }
    } catch {
      toast('Không thể kết nối đến server', 'error');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">
          <img src="/icon.png" alt="Enactus" onError={e => e.target.style.display='none'} />

          <label className="auth-label">Tên đăng nhập</label>

            onKeyDown={e => e.key === 'Enter' && handleLogin()} />
        </div>
        <div className="auth-form-group">
          <label className="auth-label">Mật khẩu</label>
          <input className="auth-input" type="password" placeholder="••••••••" value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()} />
        </div>
        <button className="auth-btn" onClick={handleLogin} disabled={loading}>

      </div>
    </div>
  );
};

// ==================== QR MODAL ====================
const QRModal = ({ code, onClose }) => {
  const qrRef = useRef(null);
  const url = `https://${YOUR_DOMAIN}/${code}`;

  useEffect(() => {
    if (qrRef.current) {
      qrRef.current.innerHTML = '';
      new QRCode(qrRef.current, { text: url, width: 200, height: 200, colorDark: '#1F2937', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
    }
  }, [code]);

  const downloadQR = () => {
    const canvas = qrRef.current?.querySelector('canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = `qr-${code}.png`;
    link.href = canvas.toDataURL();
    link.click();
  };

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">QR Code — /{code}</div>
          <button className="btn-icon" onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="modal-body">
          <div className="qr-container">
            <div ref={qrRef} id="qrcode" style={{ padding: 16, background: 'white', borderRadius: 12, border: '1px solid #E5E7EB' }} />
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 13, color: 'var(--gray-500)', marginBottom: 4 }}>Link rút gọn</div>
              <div style={{ fontFamily: 'DM Mono, monospace', fontSize: 13, color: 'var(--gray-700)', background: 'var(--gray-50)', padding: '6px 12px', borderRadius: 8 }}>{url}</div>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary btn-sm" onClick={() => { copyText(url); toast('Đã sao chép link!'); }}>
            <Icon name="copy" size={14} /> Sao chép link
          </button>
          <button className="btn btn-primary btn-sm" onClick={downloadQR}>
            <Icon name="download" size={14} /> Tải QR
          </button>
        </div>
      </div>
    </div>
  );
};

const CreateLinkView = ({ auth, onCreated }) => {
  const [url, setUrl] = useState('');
  const [alias, setAlias] = useState('');
  const [expiry, setExpiry] = useState('');
  const [password, setPassword] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [showAdvanced, setShowAdvanced] = useState(false);

  const handleSubmit = async () => {
    if (!url) { toast('Vui lòng nhập URL', 'error'); return; }
    if (alias && !/^[a-zA-Z0-9-]+$/.test(alias)) { toast('Alias chỉ dùng chữ, số, gạch ngang', 'error'); return; }
    setLoading(true);
    try {
      const body = { url };
      if (alias) body.customCode = alias;
      if (expiry) body.expiryDate = expiry;
      if (password) body.password = password;

      const res = await fetch(`${WORKER_URL}/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: auth },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (res.ok) {
        setResult(data.shortUrl);
        toast('Tạo link thành công! 🎉');
        if (onCreated) onCreated();
        setUrl(''); setAlias(''); setExpiry(''); setPassword(''); setShowAdvanced(false);
      } else {
        toast(data.error || 'Không thể tạo link', 'error');
      }
    } catch {
      toast('Không thể kết nối server', 'error');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="view-section fade-in">
      <div style={{ maxWidth: 640, margin: '0 auto' }}>
        <div className="card">
          <div className="card-header"><div className="card-title"><Icon name="link" size={16} color="var(--yellow-dark)" />Rút gọn URL mới</div></div>
          <div className="card-body">
            <div className="form-group">
              <label className="form-label">URL cần rút gọn *</label>

                value={url} onChange={e => setUrl(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleSubmit()} />
            </div>
            <div className="form-group">
              <label className="form-label">Alias tùy chỉnh</label>
              <div className="input-group">
                <div className="form-prefix">{YOUR_DOMAIN}/</div>
                <input className="form-input" placeholder="my-custom-link" maxLength={20}
                  value={alias} onChange={e => setAlias(e.target.value)} />
              </div>
              <div className="form-hint">Không bắt buộc — chỉ chữ, số, gạch ngang. Tối đa 20 ký tự</div>
            </div>
            <button onClick={() => setShowAdvanced(!showAdvanced)}
              style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--gray-500)', background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0', marginBottom: 16, fontFamily: 'DM Sans, sans-serif' }}>
              <Icon name={showAdvanced ? 'close' : 'lock'} size={14} />
              {showAdvanced ? 'Ẩn tùy chọn nâng cao' : 'Tùy chọn nâng cao (expiry, password)'}
            </button>
            {showAdvanced && (
              <div style={{ background: 'var(--gray-50)', border: '1px solid var(--gray-200)', borderRadius: 10, padding: 16, marginBottom: 18 }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label"><Icon name="clock" size={13} style={{ verticalAlign: -2, marginRight: 4 }} />Ngày hết hạn</label>
                    <input className="form-input" type="date" value={expiry}
                      min={new Date().toISOString().split('T')[0]}
                      onChange={e => setExpiry(e.target.value)} />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label"><Icon name="lock" size={13} style={{ verticalAlign: -2, marginRight: 4 }} />Mật khẩu</label>
                    <input className="form-input" type="password" placeholder="Để trống = không có"
                      value={password} onChange={e => setPassword(e.target.value)} />
                  </div>
                </div>
                <div className="form-hint" style={{ marginTop: 10 }}>Link có expiry sẽ tự động redirect về trang lỗi sau ngày hết hạn.</div>
              </div>
            )}
            <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: 14, fontSize: 15 }}
              onClick={handleSubmit} disabled={loading}>
              {loading ? <><div className="spinner" style={{ width: 18, height: 18, borderWidth: 2 }} />Đang tạo...</> : <><Icon name="link" size={16} />Rút gọn ngay</>}
            </button>
            {result && (
              <div className="result-box">
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: '#92400E' }}><Icon name="check" size={14} style={{ verticalAlign: -2 }} /> Link đã tạo thành công</span>
                </div>
                <div className="result-url">
                  <input readOnly value={result} style={{ flex: 1, padding: '9px 13px', background: 'white', border: '1.5px solid var(--gray-200)', borderRadius: 8, fontSize: 13, fontFamily: 'DM Mono, monospace', color: 'var(--gray-800)', outline: 'none' }} />
                  <button className="btn btn-primary btn-sm" onClick={() => { copyText(result); toast('Đã sao chép!'); }}><Icon name="copy" size={14} /> Copy</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== LINKS MANAGEMENT VIEW ====================
const LinksView = ({ auth, userRole, currentUsername }) => {
  const [links, setLinks] = useState([]);
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const [qrCode, setQrCode] = useState(null);
  const [utmCode, setUtmCode] = useState(null);
  const [sortBy, setSortBy] = useState('created_at');
  const [sortDir, setSortDir] = useState('desc');
  const [publicMode, setPublicMode] = useState(false);

  const fetchPublicMode = useCallback(async () => {
    try {
      const res = await fetch(`${WORKER_URL}/admin/settings/public`, { headers: { Authorization: auth } });
      const data = await res.json();
      setPublicMode(data.enabled);
    } catch (e) {}
  }, [auth]);

  const fetchLinks = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`${WORKER_URL}/links`, { headers: { Authorization: auth } });
      const data = await res.json();
      // Lọc theo quyền: nếu ko phải Admin và ko public mode thì chỉ thấy link mình tạo hoặc link được public
      const userCanSeeAll = userRole === 'Admin' || userRole === 'SuperAdmin';
      let filteredData = data;
      if (!userCanSeeAll && !publicMode) {
        filteredData = data.filter(l => l.created_by === currentUsername);
      } else if (!userCanSeeAll && publicMode) {
        filteredData = data.filter(l => l.created_by === currentUsername || l.is_public === true);
      }
      setLinks(filteredData);
    } catch { toast('Lỗi tải danh sách link', 'error'); }
    finally { setLoading(false); }
  }, [auth, userRole, currentUsername, publicMode]);

  useEffect(() => { fetchPublicMode(); fetchLinks(); }, []);

  const toggleLinkPublic = async (code, currentStatus) => {
    try {
      const res = await fetch(`${WORKER_URL}/link/${code}/toggle-public`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: auth },
        body: JSON.stringify({ is_public: !currentStatus })
      });
      if (res.ok) {
        toast(!currentStatus ? 'Đã public link' : 'Đã private link');
        fetchLinks();
      } else {
        toast('Không có quyền', 'error');
      }
    } catch { toast('Lỗi', 'error'); }
  };

  const filtered = useMemo(() => {
    let arr = links.filter(l => !search || l.code.toLowerCase().includes(search.toLowerCase()) || l.original_url.toLowerCase().includes(search.toLowerCase()));
    arr = [...arr].sort((a, b) => {
      let va = a[sortBy], vb = b[sortBy];
      if (sortBy === 'clicks') { va = va || 0; vb = vb || 0; }
      if (sortDir === 'asc') return va > vb ? 1 : -1;
      return va < vb ? 1 : -1;
    });
    return arr;
  }, [links, search, sortBy, sortDir]);

  const handleDelete = async (code) => {
    const res = await confirm('Xóa link?', `Bạn có chắc muốn xóa /${code}? Không thể hoàn tác.`, 'Xóa');
    if (!res.isConfirmed) return;
    try {
      const r = await fetch(`${WORKER_URL}/delete/${code}`, { method: 'DELETE', headers: { Authorization: auth } });
      if (r.ok) { toast(`Đã xóa /${code}`); fetchLinks(); }
      else { const d = await r.json(); toast(d.error || 'Lỗi xóa', 'error'); }
    } catch { toast('Lỗi kết nối', 'error'); }
  };

  const exportExcel = () => {
    if (!window.XLSX) { toast('Chưa tải thư viện Excel', 'error'); return; }
    const ws = XLSX.utils.json_to_sheet(links.map(l => ({
      'Short Code': l.code,
      'Short URL': `https://${YOUR_DOMAIN}/${l.code}`,
      'Original URL': l.original_url,
      'Clicks': l.clicks || 0,
      'Public': l.is_public ? 'Yes' : 'No',
      'Created By': l.created_by,
      'Created At': formatDate(l.created_at)
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Links');
    XLSX.writeFile(wb, `enactus-links-${new Date().toISOString().split('T')[0]}.xlsx`);
    toast('Đã xuất Excel!');
  };

  const canManagePublic = userRole === 'Admin' || userRole === 'SuperAdmin';

  return (
    <div className="view-section fade-in">
      {qrCode && <QRModal code={qrCode} onClose={() => setQrCode(null)} />}
      {utmCode && <UTMModal code={utmCode} onClose={() => setUtmCode(null)} />}
      <div className="card">
        <div className="card-header">
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1 }}>
            <div style={{ position: 'relative', width: 280 }}>
              <Icon name="search" size={15} color="var(--gray-400)" style={{ position: 'absolute', left: 11, top: '50%', transform: 'translateY(-50%)' }} />
              <input className="form-input" style={{ paddingLeft: 36, marginBottom: 0 }} placeholder="Tìm kiếm link..."
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <span className="badge badge-gray">{filtered.length} link</span>
            {publicMode && <span className="badge badge-yellow"><Icon name="globe" size={12} /> Public Mode</span>}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-ghost btn-sm" onClick={exportExcel}><Icon name="download" size={14} />Excel</button>
            <button className="refresh-btn" onClick={fetchLinks}><Icon name="refresh" size={13} />Làm mới</button>
          </div>
        </div>
        {loading ? (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 48 }}><div className="spinner" /></div>
        ) : filtered.length === 0 ? (
          <div className="empty-state"><Icon name="link" size={36} color="var(--gray-300)" /><p>Không có link nào{search ? ` khớp với "${search}"` : ''}</p></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>Code</th><th>Short URL</th><th>Destination</th><th style={{ cursor: 'pointer' }} onClick={() => { setSortBy('clicks'); setSortDir(sortBy === 'clicks' && sortDir === 'desc' ? 'asc' : 'desc'); }}>Clicks</th><th>Người tạo</th><th>Public</th><th>Hành động</th></tr>
              </thead>
              <tbody>
                {filtered.map(link => (
                  <tr key={link.code}>
                    <td><span className="code-chip">{link.code}</span></td>
                    <td><a href={`https://${YOUR_DOMAIN}/${link.code}`} target="_blank" style={{ color: 'var(--yellow-dark)', fontFamily: 'DM Mono, monospace', fontSize: 12.5, textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 4 }}>{YOUR_DOMAIN}/{link.code} <Icon name="external" size={12} /></a></td>
                    <td><div style={{ maxWidth: 220, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: 12.5, color: 'var(--gray-500)' }} title={link.original_url}>{link.original_url}</div></td>
                    <td><span className="badge badge-gray"><Icon name="analytics" size={11} />{link.clicks || 0}</span></td>
                    <td style={{ fontSize: 12, color: 'var(--gray-500)' }}>{link.created_by || 'unknown'}</td>
                    <td>
                      {canManagePublic ? (
                        <button className={`btn-icon ${link.is_public ? 'text-green' : 'text-gray'}`} onClick={() => toggleLinkPublic(link.code, link.is_public)} title={link.is_public ? 'Đang public - Click để private' : 'Đang private - Click để public'}>
                          <Icon name={link.is_public ? 'globe' : 'lock'} size={16} color={link.is_public ? '#10B981' : '#6B7280'} />
                        </button>
                      ) : (
                        <span className="badge badge-gray">{link.is_public ? 'Public' : 'Private'}</span>
                      )}
                    </td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn-icon" onClick={() => { copyText(`https://${YOUR_DOMAIN}/${link.code}`); toast('Đã sao chép!'); }}><Icon name="copy" size={15} /></button>
                        <button className="btn-icon" onClick={() => setQrCode(link.code)} style={{ color: 'var(--purple)' }}><Icon name="qr" size={15} /></button>
                        <button className="btn-icon" onClick={() => setUtmCode(link.code)} style={{ color: 'var(--blue)' }}><Icon name="tag" size={15} /></button>
                        {(link.created_by === currentUsername || userRole === 'Admin' || userRole === 'SuperAdmin') && (
                          <button className="btn-icon" onClick={() => handleDelete(link.code)} style={{ color: 'var(--red)' }}><Icon name="trash" size={15} /></button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
};
// ==================== ANALYTICS VIEW ====================
const AnalyticsView = () => {
  const [logs, setLogs] = useState({ clickLogs: [], actionLogs: [], users: {} });
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('overview');

  const fetchLogs = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`${WORKER_URL}/logs`);
      setLogs(await res.json());
    } catch { toast('Lỗi tải logs', 'error'); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { fetchLogs(); }, []);

  const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' });
  const todayClicks = useMemo(() => (logs.clickLogs || []).filter(l => { const d = l.time?.split(' ')[1]?.split('/').reverse().join('-'); return d === today; }).length, [logs]);
  const todayActions = useMemo(() => (logs.actionLogs || []).filter(l => { const d = l.time?.split(' ')[1]?.split('/').reverse().join('-'); return d === today; }).length, [logs]);
  const todayNewLinks = useMemo(() => (logs.actionLogs || []).filter(l => { const d = l.time?.split(' ')[1]?.split('/').reverse().join('-'); return d === today && l.action === 'create_link'; }).length, [logs]);

  const deviceStats = useMemo(() => {
    const devices = {};
    (logs.clickLogs || []).forEach(l => {
      const ua = (l.ua || l.userAgent || '').toLowerCase();
      let d = 'Unknown';
      if (ua.includes('mobile') || ua.includes('android') || ua.includes('iphone')) d = 'Mobile';
      else if (ua.includes('tablet') || ua.includes('ipad')) d = 'Tablet';
      else if (ua.length > 0) d = 'Desktop';
      devices[d] = (devices[d] || 0) + 1;
    });
    return Object.entries(devices).sort((a, b) => b[1] - a[1]);
  }, [logs]);

  const geoStats = useMemo(() => {
    const countries = {};
    (logs.clickLogs || []).forEach(l => {
      const c = l.country || l.cf_country || 'Unknown';
      countries[c] = (countries[c] || 0) + 1;
    });
    return Object.entries(countries).sort((a, b) => b[1] - a[1]).slice(0, 8);
  }, [logs]);

  const actionLabel = { create_link: 'Tạo link', delete_link: 'Xóa link', set_name: 'Đặt tên' };
  const actionColor = { create_link: 'badge-green', delete_link: 'badge-red', set_name: 'badge-blue' };

  return (
    <div className="view-section fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 20 }}>
        <div className="card" style={{ padding: 18 }}><div style={{ fontSize: 12, color: 'var(--gray-500)', marginBottom: 6 }}>Clicks hôm nay</div><div style={{ fontSize: 28, fontWeight: 700, color: 'var(--yellow-dark)' }}>{todayClicks}</div></div>
        <div className="card" style={{ padding: 18 }}><div style={{ fontSize: 12, color: 'var(--gray-500)', marginBottom: 6 }}>Link tạo hôm nay</div><div style={{ fontSize: 28, fontWeight: 700, color: 'var(--blue)' }}>{todayNewLinks}</div></div>
        <div className="card" style={{ padding: 18 }}><div style={{ fontSize: 12, color: 'var(--gray-500)', marginBottom: 6 }}>Hành động hôm nay</div><div style={{ fontSize: 28, fontWeight: 700, color: 'var(--green)' }}>{todayActions}</div></div>
        <div className="card" style={{ padding: 18 }}><div style={{ fontSize: 12, color: 'var(--gray-500)', marginBottom: 6 }}>Tổng người dùng</div><div style={{ fontSize: 28, fontWeight: 700, color: 'var(--purple)' }}>{Object.keys(logs.users || {}).length}</div></div>
      </div>
      <div style={{ marginBottom: 16 }}><div className="tab-group">
        <button className={`tab-btn ${tab === 'overview' ? 'active' : ''}`} onClick={() => setTab('overview')}>Tổng quan</button>
        <button className={`tab-btn ${tab === 'clicks' ? 'active' : ''}`} onClick={() => setTab('clicks')}>Click logs</button>
        <button className={`tab-btn ${tab === 'actions' ? 'active' : ''}`} onClick={() => setTab('actions')}>Action logs</button>
      </div></div>
      {loading ? <div style={{ display: 'flex', justifyContent: 'center', padding: 40 }}><div className="spinner" /></div>
      : tab === 'overview' ? (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <div className="card"><div className="card-header"><div className="card-title"><Icon name="globe" size={15} color="var(--blue)" />Thiết bị truy cập</div></div><div className="card-body">{deviceStats.length === 0 ? <div className="empty-state">Không có dữ liệu</div> : deviceStats.map(([device, count], i) => { const total = deviceStats.reduce((s, [, c]) => s + c, 0); const pct = total > 0 ? Math.round((count / total) * 100) : 0; const colors = ['var(--yellow)', 'var(--blue)', 'var(--green)', 'var(--purple)']; return (<div key={i} style={{ marginBottom: 14 }}><div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 5 }}><span style={{ fontWeight: 500 }}>{device}</span><span style={{ color: 'var(--gray-500)' }}>{count} ({pct}%)</span></div><div className="progress-wrap"><div className="progress-bar" style={{ width: `${pct}%`, background: colors[i % colors.length] }} /></div></div>); })}</div></div>
          <div className="card"><div className="card-header"><div className="card-title"><Icon name="globe" size={15} color="var(--green)" />Vị trí địa lý</div></div><div className="card-body">{geoStats.length === 0 ? <div className="empty-state">Không có dữ liệu</div> : geoStats.map(([country, count], i) => { const total = geoStats.reduce((s, [, c]) => s + c, 0); const pct = total > 0 ? Math.round((count / total) * 100) : 0; return (<div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10, fontSize: 13 }}><span style={{ width: 100, fontWeight: 500 }}>{country}</span><div style={{ flex: 1 }}><div className="progress-wrap"><div className="progress-bar" style={{ width: `${pct}%`, background: 'var(--green)' }} /></div></div><span style={{ width: 36, textAlign: 'right', color: 'var(--gray-500)' }}>{count}</span></div>); })}</div></div>
        </div>
      ) : tab === 'clicks' ? (
        <div className="card"><div className="card-header"><div className="card-title"><Icon name="chart" size={15} color="var(--yellow-dark)" />Click logs ({(logs.clickLogs || []).length} bản ghi)</div><button className="refresh-btn" onClick={fetchLogs}><Icon name="refresh" size={13} />Làm mới</button></div><div className="table-wrap"><table><thead><tr><th>Thời gian</th><th>IP</th><th>Người dùng</th><th>Link</th><th>UTM</th><th>Đích đến</th></tr></thead><tbody>{(logs.clickLogs || []).length === 0 ? <tr><td colSpan={6} style={{ textAlign: 'center', padding: 32 }}>Chưa có log nào</td></tr> : (logs.clickLogs || []).map((l, i) => (<tr key={i}><td style={{ fontSize: 12, fontFamily: 'DM Mono, monospace' }}>{l.time}</td><td style={{ fontSize: 12, fontFamily: 'DM Mono, monospace' }}>{l.ip}</td><td>{l.user || 'unknown'}</td><td><a href={`https://${YOUR_DOMAIN}/${l.code}`} target="_blank" className="code-chip">/{l.code}</a></td><td><span className="badge badge-yellow">{l.utm || 'Direct'}</span></td><td style={{ fontSize: 12, color: 'var(--gray-500)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={l.target}>{l.target}</td></tr>))}</tbody></table></div></div>
      ) : (
        <div className="card"><div className="card-header"><div className="card-title"><Icon name="logs" size={15} color="var(--purple)" />Action logs ({(logs.actionLogs || []).length} bản ghi)</div><button className="refresh-btn" onClick={fetchLogs}><Icon name="refresh" size={13} />Làm mới</button></div><div className="table-wrap"><table><thead><tr><th>Thời gian</th><th>IP</th><th>Người dùng</th><th>Hành động</th><th>Chi tiết</th></tr></thead><tbody>{(logs.actionLogs || []).length === 0 ? <tr><td colSpan={5} style={{ textAlign: 'center', padding: 32 }}>Chưa có log nào</td></tr> : (logs.actionLogs || []).map((l, i) => { let detail = ''; if (l.details?.code) detail = `/${l.details.code}`; if (l.details?.url) detail += ` → ${l.details.url.substring(0, 40)}...`; if (l.details?.name) detail = `"${l.details.name}"`; return (<tr key={i}><td style={{ fontSize: 12, fontFamily: 'DM Mono, monospace' }}>{l.time}</td><td style={{ fontSize: 12, fontFamily: 'DM Mono, monospace' }}>{l.ip}</td><td>{l.user || 'unknown'}</td><td><span className={`badge ${actionColor[l.action] || 'badge-gray'}`}>{actionLabel[l.action] || l.action}</span></td><td style={{ fontSize: 12, color: 'var(--gray-500)' }}>{detail || '-'}</td></tr>); })}</tbody></table></div></div>
      )}
    </div>
  );
};

// ==================== ADMIN VIEW ====================
const AdminView = ({ auth, currentUser }) => {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showUserModal, setShowUserModal] = useState(false);
  const [editingUser, setEditingUser] = useState(null);
  const [publicMode, setPublicMode] = useState(false);
  const [selectedUserLogs, setSelectedUserLogs] = useState(null);
  const [form, setForm] = useState({ fullname: '', department: '', username: '', role: 'Member' });

  const fetchUsers = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`${WORKER_URL}/admin/users`, { headers: { Authorization: auth } });
      if (res.status === 403) { toast('Bạn không có quyền truy cập', 'error'); return; }
      const data = await res.json();
      setUsers(data);
    } catch (e) { toast('Lỗi tải users', 'error'); } finally { setLoading(false); }
  }, [auth]);

  const fetchPublicMode = useCallback(async () => {
    try {
      const res = await fetch(`${WORKER_URL}/admin/settings/public`, { headers: { Authorization: auth } });
      const data = await res.json();
      setPublicMode(data.enabled);
    } catch (e) {}
  }, [auth]);

  useEffect(() => { fetchUsers(); fetchPublicMode(); }, []);

  const handleSaveUser = async () => {
    if (!form.username) { toast('Vui lòng nhập username', 'error'); return; }
    try {
      const method = editingUser ? 'PUT' : 'POST';
      const url = editingUser ? `${WORKER_URL}/admin/users/${editingUser.username}` : `${WORKER_URL}/admin/users`;
      const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', Authorization: auth }, body: JSON.stringify(form) });
      if (res.ok) {
        toast(editingUser ? 'Cập nhật thành công' : 'Tạo user thành công. Mật khẩu = username');
        fetchUsers();
        setShowUserModal(false);
        setEditingUser(null);
        setForm({ fullname: '', department: '', username: '', role: 'Member' });
      } else { const err = await res.json(); toast(err.error || 'Lỗi', 'error'); }
    } catch { toast('Lỗi kết nối', 'error'); }
  };

  const handleResetPassword = async (username) => {
    const confirm = await Swal.fire({ title: 'Reset mật khẩu?', text: `Mật khẩu mới: ${username}`, icon: 'warning', showCancelButton: true });
    if (!confirm.isConfirmed) return;
    try {
      const res = await fetch(`${WORKER_URL}/admin/users/${username}/reset-password`, { method: 'POST', headers: { Authorization: auth } });
      if (res.ok) toast(`Mật khẩu mới: ${username}`, 'success');
    } catch { toast('Lỗi reset', 'error'); }
  };

  const handleToggleStatus = async (username) => {
    try {
      const res = await fetch(`${WORKER_URL}/admin/users/${username}/toggle-status`, { method: 'POST', headers: { Authorization: auth } });
      if (res.ok) { toast('Đã thay đổi trạng thái'); fetchUsers(); }
    } catch { toast('Lỗi', 'error'); }
  };

  const handleDeleteUser = async (username) => {
    const confirm = await Swal.fire({ title: 'Xóa user?', text: `Xóa ${username}?`, icon: 'error', showCancelButton: true });
    if (!confirm.isConfirmed) return;
    try {
      const res = await fetch(`${WORKER_URL}/admin/users/${username}`, { method: 'DELETE', headers: { Authorization: auth } });
      if (res.ok) { toast('Đã xóa user'); fetchUsers(); }
    } catch { toast('Lỗi', 'error'); }
  };

  const viewUserLogs = async (username) => {
    try {
      const res = await fetch(`${WORKER_URL}/admin/logs/${username}`, { headers: { Authorization: auth } });
      const logs = await res.json();
      setSelectedUserLogs({ username, logs });
    } catch { toast('Lỗi tải logs', 'error'); }
  };

  const togglePublicMode = async () => {
    try {
      const res = await fetch(`${WORKER_URL}/admin/settings/public`, { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: auth }, body: JSON.stringify({ enabled: !publicMode }) });
      if (res.ok) { setPublicMode(!publicMode); toast(publicMode ? 'Private Mode' : 'Public Mode'); }
    } catch { toast('Lỗi', 'error'); }
  };

  const roleBadgeColor = { SuperAdmin: 'badge-purple', Admin: 'badge-blue', Member: 'badge-gray' };

  return (
    <div className="view-section fade-in">
      <div className="card" style={{ marginBottom: 20 }}>
        <div className="card-header"><div className="card-title"><Icon name="globe" size={16} color="var(--yellow-dark)" />Chế độ xem</div><button className={`btn ${publicMode ? 'btn-primary' : 'btn-secondary'}`} onClick={togglePublicMode}><Icon name={publicMode ? 'check' : 'lock'} size={14} />{publicMode ? '🔓 Public Mode' : '🔒 Private Mode'}</button></div>
        <div className="card-body"><div style={{ fontSize: 13, color: 'var(--gray-500)' }}>{publicMode ? 'Tất cả thành viên đều xem được toàn bộ link' : 'Mỗi thành viên chỉ xem được link mình tạo'}</div></div>
      </div>
      <div className="card">
        <div className="card-header"><div className="card-title"><Icon name="user" size={16} color="var(--purple)" />Quản lý tài khoản</div><button className="btn btn-primary btn-sm" onClick={() => { setEditingUser(null); setForm({ fullname: '', department: '', username: '', role: 'Member' }); setShowUserModal(true); }}><Icon name="user" size={14} /> Thêm user</button></div>
        {loading ? <div style={{ padding: 40, textAlign: 'center' }}><div className="spinner" /></div> : (
          <div className="table-wrap"><table><thead><tr><th>Fullname</th><th>Department</th><th>Username</th><th>Role</th><th>Status</th><th>Created At</th><th>Actions</th></tr></thead><tbody>{users.map(user => (<tr key={user.username} style={{ opacity: user.status === 'disabled' ? 0.5 : 1 }}><td style={{ fontWeight: 500 }}>{user.fullname || '-'}</td><td>{user.department || '-'}</td><td><span className="code-chip">{user.username}</span></td><td><span className={`badge ${roleBadgeColor[user.role] || 'badge-gray'}`}>{user.role}</span></td><td><span className={`badge ${user.status === 'active' ? 'badge-green' : 'badge-red'}`}>{user.status === 'active' ? 'Active' : 'Disabled'}</span></td><td style={{ fontSize: 12 }}>{formatDate(user.created_at)}</td><td><div style={{ display: 'flex', gap: 5 }}><button className="btn-icon" onClick={() => { setEditingUser(user); setForm({ fullname: user.fullname || '', department: user.department || '', username: user.username, role: user.role }); setShowUserModal(true); }}><Icon name="edit" size={14} /></button><button className="btn-icon" onClick={() => handleResetPassword(user.username)}><Icon name="lock" size={14} /></button><button className="btn-icon" onClick={() => handleToggleStatus(user.username)}><Icon name={user.status === 'active' ? 'close' : 'check'} size={14} /></button><button className="btn-icon" onClick={() => viewUserLogs(user.username)}><Icon name="logs" size={14} /></button>{user.username !== 'admin' && <button className="btn-icon" onClick={() => handleDeleteUser(user.username)} style={{ color: 'var(--red)' }}><Icon name="trash" size={14} /></button>}</div></td></tr>))}</tbody></table></div>
        )}
      </div>
      {showUserModal && (<div className="modal-backdrop" onClick={e => e.target === e.currentTarget && setShowUserModal(false)}><div className="modal"><div className="modal-header"><div className="modal-title">{editingUser ? 'Sửa user' : 'Thêm user mới'}</div><button className="btn-icon" onClick={() => setShowUserModal(false)}><Icon name="close" size={18} /></button></div><div className="modal-body"><div className="form-group"><label className="form-label">Họ và tên</label><input className="form-input" value={form.fullname} onChange={e => setForm({ ...form, fullname: e.target.value })} /></div><div className="form-group"><label className="form-label">Phòng ban</label><input className="form-input" value={form.department} onChange={e => setForm({ ...form, department: e.target.value })} /></div><div className="form-group"><label className="form-label">Username</label><input className="form-input" value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} disabled={!!editingUser} /></div><div className="form-group"><label className="form-label">Role</label><select className="form-input" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}><option value="Member">Member</option><option value="Admin">Admin</option>{currentUser?.role === 'SuperAdmin' && <option value="SuperAdmin">SuperAdmin</option>}</select></div>{!editingUser && <div className="form-hint">Mật khẩu mặc định = username</div>}</div><div className="modal-footer"><button className="btn btn-secondary" onClick={() => setShowUserModal(false)}>Hủy</button><button className="btn btn-primary" onClick={handleSaveUser}>Lưu</button></div></div></div>)}
      {selectedUserLogs && (<div className="modal-backdrop" onClick={e => e.target === e.currentTarget && setSelectedUserLogs(null)}><div className="modal" style={{ maxWidth: 600 }}><div className="modal-header"><div className="modal-title">Logs của {selectedUserLogs.username}</div><button className="btn-icon" onClick={() => setSelectedUserLogs(null)}><Icon name="close" size={18} /></button></div><div className="modal-body">{selectedUserLogs.logs.length === 0 ? <div className="empty-state">Chưa có logs</div> : <div style={{ maxHeight: 400, overflowY: 'auto' }}>{selectedUserLogs.logs.map((log, i) => (<div key={i} style={{ padding: '8px 0', borderBottom: '1px solid var(--gray-100)', fontSize: 12 }}><div style={{ fontFamily: 'DM Mono, monospace', fontSize: 11, color: 'var(--gray-500)' }}>{log.time}</div><div><span className="badge badge-gray">{log.action}</span> {log.details?.code && `/${log.details.code}`}</div></div>))}</div>}</div></div></div>)}
    </div>
  );
};

// ==================== NAME MODAL ====================
const NameModal = ({ auth, onDone }) => {
  const [name, setName] = useState('');
  const deviceId = useMemo(() => { let id = localStorage.getItem('deviceId'); if (!id) { id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); localStorage.setItem('deviceId', id); } return id; }, []);

  const save = async () => {
    if (!name.trim()) { toast('Vui lòng nhập tên', 'error'); return; }
    try {
      await fetch(`${WORKER_URL}/set-name`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name.trim(), device: deviceId }) });
      localStorage.setItem('userName', name.trim());
      onDone(name.trim());
    } catch { toast('Lỗi lưu tên', 'error'); }
  };

  return (<div className="modal-backdrop"><div className="modal"><div className="modal-header"><div className="modal-title">Chào mừng!</div></div><div className="modal-body"><p style={{ fontSize: 13.5, color: 'var(--gray-500)', marginBottom: 16 }}>Đặt tên để hiển thị trong logs hệ thống.</p><div className="form-group"><label className="form-label">Tên của bạn</label><input className="form-input" placeholder="Nguyễn Văn A" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && save()} autoFocus /></div></div><div className="modal-footer"><button className="btn btn-primary" onClick={save}><Icon name="check" size={15} />Xác nhận</button></div></div></div>);
};

// ==================== MAIN APP ====================
const App = () => {
  const [auth, setAuth] = useState(() => sessionStorage.getItem('adminAuth'));
  const [adminUser, setAdminUser] = useState(() => sessionStorage.getItem('adminUser') || '');
  const [userRole, setUserRole] = useState(() => sessionStorage.getItem('userRole') || 'Member');
  const [currentUserInfo, setCurrentUserInfo] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [loading, setLoading] = useState(false);
  const [userName, setUserName] = useState(() => localStorage.getItem('userName'));
  const [showNameModal, setShowNameModal] = useState(false);
  const [userFullname, setUserFullname] = useState(() => localStorage.getItem('userFullname') || '');

const handleLogin = (a, u, userData) => { 
  setAuth(a); 
  setAdminUser(u); 
  setCurrentUserInfo(userData); 
  setUserRole(userData?.role || 'Member');
  if (userData?.fullname) {
    setUserFullname(userData.fullname);
    localStorage.setItem('userFullname', userData.fullname);
  }
};  const handleLogout = () => { sessionStorage.removeItem('adminAuth'); sessionStorage.removeItem('adminUser'); sessionStorage.removeItem('userRole'); setAuth(null); setAdminUser(''); setUserRole('Member'); };

  useEffect(() => { if (auth && !userName) setShowNameModal(true); }, [auth, userName]);

  useEffect(() => {
    if (!auth) return;
    const deviceId = localStorage.getItem('deviceId') || ('device_' + Date.now());
    fetch(`${WORKER_URL}/get-name?device=${deviceId}`).then(r => r.json()).then(d => { if (d.name) { setUserName(d.name); localStorage.setItem('userName', d.name); } else if (!localStorage.getItem('userName')) setShowNameModal(true); }).catch(() => { if (!localStorage.getItem('userName')) setShowNameModal(true); });
  }, [auth]);

  if (!auth) return <AuthScreen onLogin={handleLogin} />;

  const navItems = [
    { key: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
    { key: 'create', label: 'Tạo link mới', icon: 'link' },
    { key: 'links', label: 'Quản lý link', icon: 'list' },
  ];
  if (userRole === 'Admin' || userRole === 'SuperAdmin') {
    navItems.push({ key: 'analytics', label: 'Analytics & Logs', icon: 'analytics' });
  }
  if (userRole === 'SuperAdmin') {
    navItems.push({ key: 'admin', label: 'Admin Panel', icon: 'user' });
  }

  const pageTitles = { dashboard: 'Tổng quan', create: 'Tạo link mới', links: 'Quản lý link', analytics: 'Analytics & Logs', admin: 'Admin Panel' };
  const initials = (adminUser || userName || 'U').substring(0, 2).toUpperCase();

  return (
    <>
      {showNameModal && <NameModal auth={auth} onDone={n => { setUserName(n); setShowNameModal(false); }} />}
      <aside className="sidebar">
        <div className="sidebar-logo"><img src="/icon.png" alt="Enactus" onError={e => e.target.style.display='none'} /><div className="sidebar-logo-text"><h1>URL Shortener</h1><p>Enactus FTU Hanoi</p></div></div>
        <nav className="sidebar-nav"><div className="nav-section-label">Menu</div>{navItems.map(item => (<a key={item.key} className={`nav-item ${tab === item.key ? 'active' : ''}`} onClick={() => setTab(item.key)} href="#"><Icon name={item.icon} size={17} />{item.label}</a>))}</nav>
        <div className="sidebar-footer"><div className="sidebar-user" onClick={() => { if (window.confirm('Đăng xuất?')) handleLogout(); }}>
  <div className="sidebar-avatar">
    {(userFullname ? userFullname.substring(0,2).toUpperCase() : (userName ? userName.substring(0,2).toUpperCase() : (adminUser ? adminUser.substring(0,2).toUpperCase() : 'U')))}
  </div>
  <div className="sidebar-user-info">
    <p>{userFullname || userName || adminUser || 'Người dùng'}</p>
    <span>{userRole || 'Member'}</span>
  </div>
</div></div>
      </aside>
      <main className="main">
        <header className="topbar"><div className="topbar-title">{pageTitles[tab]}</div><div className="topbar-meta"><div className="topbar-badge"><span className="dot" /><span style={{ fontFamily: 'DM Mono, monospace', fontSize: 12 }}>{YOUR_DOMAIN}</span></div><div style={{ fontSize: 13, color: 'var(--gray-500)' }}>{new Date().toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' })}</div></div></header>
        <div className="content" style={{ position: 'relative' }}>
          {loading && <div className="loading-overlay"><div className="spinner" /></div>}
          {tab === 'dashboard' && <DashboardView auth={auth} />}
          {tab === 'create' && <CreateLinkView auth={auth} onCreated={() => {}} />}
          {tab === 'links' && <LinksView auth={auth} />}
          {tab === 'analytics' && <AnalyticsView />}
          {tab === 'admin' && <AdminView auth={auth} currentUser={currentUserInfo} />}
        </div>
      </main>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
