// ==================== UTILS ====================
const copyText = async (text) => {
  try { await navigator.clipboard.writeText(text); return true; }
  catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); return true; }
};
const toast = (title, icon='success', timer=1800) =>
  Swal.fire({ icon, title, timer, showConfirmButton:false, toast:true, position:'top-end', timerProgressBar:true });
const confirmDialog = (title, text, confirmText='Xác nhận') =>
  Swal.fire({ title, text, icon:'warning', showCancelButton:true, confirmButtonColor:'#FFC107', cancelButtonText:'Hủy', confirmButtonText:confirmText });
const formatDate = (d) => d ? new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}) : '-';

const isExpired = (expiry) => expiry && new Date(expiry) < new Date();
const daysUntil = (expiry) => {
  if (!expiry) return null;
  return Math.ceil((new Date(expiry) - new Date()) / 86400000);
};
const getPasswordStrength = (pw) => {
  if (!pw) return { score:0, label:'', color:'var(--gray-200)', pct:0 };
  let s=0;
  if (pw.length>=6) s++; if (pw.length>=10) s++;
  if (/[A-Z]/.test(pw)) s++; if (/[0-9]/.test(pw)) s++; if (/[^A-Za-z0-9]/.test(pw)) s++;
  if (s<=1) return { score:s, label:'Rất yếu', color:'#EF4444', pct:20 };
  if (s===2) return { score:s, label:'Yếu', color:'#F97316', pct:40 };
  if (s===3) return { score:s, label:'Trung bình', color:'#FFC107', pct:60 };
  if (s===4) return { score:s, label:'Mạnh', color:'#10B981', pct:80 };
  return { score:s, label:'Rất mạnh', color:'#059669', pct:100 };
};

// ==================== STATUS BADGE cho link ====================
const LinkStatusBadges = ({ link }) => {
  const badges = [];
  if (isExpired(link.expiry_date)) {
    badges.push(<span key="e" className="badge badge-red" style={{fontSize:11}}><Icon name="clock" size={10}/>Expired</span>);
  } else {
    const days = daysUntil(link.expiry_date);
    if (days !== null && days <= 7) {
      badges.push(<span key="w" className="badge badge-orange" style={{fontSize:11}}><Icon name="clock" size={10}/>{days} days</span>);
    } else {
      badges.push(<span key="a" className="badge badge-green" style={{fontSize:11}}>Active</span>);
    }
  }
  if (link.has_password) badges.push(<span key="p" className="badge badge-blue" style={{fontSize:11}}><Icon name="lock" size={10}/>Password</span>);
  return <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{badges}</div>;
};

      const [sr,hr,ur] = await Promise.all([fetch(`${WORKER_URL}/stats`),fetch(`${WORKER_URL}/hourly-stats`),fetch(`${WORKER_URL}/top-utm`)]);
      const [sd,hd,ud] = await Promise.all([sr.json(),hr.json(),ur.json()]);
      setStats(sd); setHourly(hd||[]); setTopUTM((ud||[]).filter(i=>i.utms?.length>0).slice(0,5));
    } catch(e){console.error(e);}
    finally {setLoading(false);}
  },[]);

  useEffect(()=>{fetchAll();},[fetchAll]);
  useEffect(()=>()=>{dailyInst.current?.destroy();hourlyInst.current?.destroy();},[]);

  useEffect(()=>{
    if(!stats?.dailyClicks||!dailyRef.current)return;
    if(dailyInst.current)dailyInst.current.destroy();
    dailyInst.current=new Chart(dailyRef.current.getContext('2d'),{type:'line',data:{labels:stats.dailyClicks.map(d=>d.date),datasets:[{label:'Clicks',data:stats.dailyClicks.map(d=>d.clicks),borderColor:'#FFC107',backgroundColor:'rgba(255,193,7,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#FFC107',pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:4,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#F3F4F6'},ticks:{color:'#9CA3AF',font:{family:'DM Sans'}}},x:{grid:{display:false},ticks:{color:'#9CA3AF',font:{family:'DM Sans'}}}}}});
  },[stats]);

  useEffect(()=>{
    if(!hourly.length||!hourlyRef.current)return;
    if(hourlyInst.current)hourlyInst.current.destroy();
    const now=new Date().getHours();
    const f=hourly.filter(d=>d.hour<=now);
    hourlyInst.current=new Chart(hourlyRef.current.getContext('2d'),{type:'bar',data:{labels:f.map(d=>`${d.hour}:00`),datasets:[{data:f.map(d=>d.clicks||0),backgroundColor:'#FFC107',borderRadius:6,borderColor:'#F59E0B',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#F3F4F6'},ticks:{color:'#9CA3AF',font:{family:'DM Sans'}}},x:{grid:{display:false},ticks:{color:'#9CA3AF',font:{family:'DM Sans',size:11}}}}}});
  },[hourly]);

  const cards=[
    {label:'Tổng số link',value:stats?.totalLinks||0,icon:'link',color:'#FFC107',bg:'#FFFBEB'},
    {label:'Tổng lượt click',value:stats?.totalClicks||0,icon:'analytics',color:'#3B82F6',bg:'#EFF6FF'},
    {label:'Hôm nay',value:stats?.todayClicks||0,icon:'clock',color:'#10B981',bg:'#ECFDF5'},
    {label:'Link hot nhất',value:stats?.topLinks?.[0]?.code?`/${stats.topLinks[0].code}`:'-',icon:'fire',color:'#8B5CF6',bg:'#F5F3FF'},
  ];

  return (
    <div className="view-section fade-in">
      {loading&&<div style={{textAlign:'center',padding:'40px'}}><div className="spinner" style={{margin:'0 auto 12px'}}/><div style={{fontSize:14,color:'var(--gray-400)'}}>Đang tải...</div></div>}
      {!loading&&<>
        <div className="stats-grid">
          {cards.map((s,i)=>(
            <div key={i} className="stat-card">
              <div className="stat-bg" style={{background:s.color}}/>
              <div className="stat-icon" style={{background:s.bg}}><Icon name={s.icon} size={18} color={s.color}/></div>
              <div className="stat-label">{s.label}</div>
              <div className="stat-value" style={{fontSize:s.label==='Link hot nhất'?20:28,fontFamily:s.label==='Link hot nhất'?'DM Mono,monospace':undefined}}>{s.value}</div>
            </div>
          ))}
        </div>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><div className="card-title"><Icon name="chart" size={16} color="var(--yellow-dark)"/>Lượt click 7 ngày</div><button className="refresh-btn" onClick={fetchAll}><Icon name="refresh" size={13}/>Làm mới</button></div>
          <div className="card-body"><div className="chart-wrap" style={{height:240}}><canvas ref={dailyRef}/></div></div>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><div className="card-title"><Icon name="clock" size={16} color="var(--blue)"/>Lưu lượng theo giờ hôm nay</div></div>
          <div className="card-body"><div className="chart-wrap" style={{height:200}}><canvas ref={hourlyRef}/></div></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div className="card">
            <div className="card-header"><div className="card-title"><Icon name="tag" size={16} color="var(--purple)"/>Top nguồn truy cập</div></div>
            <div className="card-body" style={{padding:'16px 20px'}}>
              {topUTM.length===0?<div className="empty-state" style={{padding:'24px 0'}}><p style={{fontSize:13}}>Chưa có dữ liệu UTM</p></div>
              :topUTM.map((item,i)=>{
                const total=item.totalClicks||0;
                return <div key={i} style={{marginBottom:i<topUTM.length-1?16:0}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{width:22,height:22,borderRadius:'50%',background:'var(--yellow)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{i+1}</span>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'var(--yellow-dark)',fontWeight:600}}>/{item.link}</span>
                    </div>
                    <span className="badge badge-gray">{total} clicks</span>
                  </div>
                  {item.utms.slice(0,3).map(([utm,clicks],j)=>{
                    const pct=total>0?Math.round((clicks/total)*100):0;
                    return <div key={j} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,fontSize:12}}>
                      <span style={{width:70,color:'var(--gray-500)',fontFamily:'DM Mono,monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{utm||'Direct'}</span>
                      <div style={{flex:1}}><div className="progress-wrap"><div className="progress-bar" style={{width:`${pct}%`}}/></div></div>
                      <span style={{width:28,textAlign:'right',color:'var(--gray-600)',fontWeight:600}}>{pct}%</span>
                    </div>;
                  })}
                </div>;
              })}
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title"><Icon name="star" size={16} color="var(--yellow-dark)"/>Top 5 link phổ biến</div></div>
            <div className="card-body" style={{padding:'16px 20px'}}>
              {!stats?.topLinks?.length?<div className="empty-state" style={{padding:'24px 0'}}><p style={{fontSize:13}}>Chưa có dữ liệu</p></div>
              :stats.topLinks.map((link,i)=>{
                const max=stats.topLinks[0]?.clicks||1;
                const pct=Math.round((link.clicks/max)*100);
                return <div key={i} style={{marginBottom:i<stats.topLinks.length-1?14:0}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{width:22,height:22,borderRadius:'50%',background:i===0?'var(--yellow)':'var(--gray-100)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:i===0?'var(--gray-800)':'var(--gray-500)'}}>{i+1}</span>
                      <a href={`https://${YOUR_DOMAIN}/${link.code}`} target="_blank" style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'var(--yellow-dark)',textDecoration:'none',fontWeight:600}}>/{link.code}</a>
                    </div>
                    <span className="badge badge-gray">{link.clicks} clicks</span>
                  </div>
                  <div style={{paddingLeft:30}}><div className="progress-wrap"><div className="progress-bar" style={{width:`${pct}%`}}/></div></div>
                </div>;
              })}
            </div>
          </div>
        </div>
      </>}
    </div>
  );
};

// ==================== CREATE LINK ====================
const CreateLinkView = ({ auth }) => {
  const [url,setUrl]=useState('');
  const [alias,setAlias]=useState('');
  const [expiry,setExpiry]=useState('');
  const [password,setPassword]=useState('');
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [showAdv,setShowAdv]=useState(false);
  const [seoConfigs, setSeoConfigs] = useState([]);
  const [selectedSeoId, setSelectedSeoId] = useState('');
  
  useEffect(() => {
    const fetchSeoConfigs = async () => {
      try {
        const res = await fetch(`${WORKER_URL}/admin/seo-configs`, { headers: { Authorization: auth } });
        if (res.ok) setSeoConfigs(await res.json());
      } catch(e) { console.error(e); }
    };
    fetchSeoConfigs();
  }, [auth]);

  const handle = async () => {
    if (!url){toast('Vui lòng nhập URL','error');return;}
    if (alias&&!/^[a-zA-Z0-9-]+$/.test(alias)){toast('Alias chỉ dùng chữ, số, gạch ngang','error');return;}
    setLoading(true);
    try {
      const body={url};
      if(alias)body.customCode=alias;
      if(expiry)body.expiryDate=expiry;
      if(password)body.password=password;
      if(selectedSeoId)body.seoConfigId=selectedSeoId;
      const res=await fetch(`${WORKER_URL}/shorten`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:auth},body:JSON.stringify(body)});
      const data=await res.json();
      if(res.ok){setResult(data.shortUrl);toast('Tạo link thành công! 🎉');setUrl('');setAlias('');setExpiry('');setPassword('');setSelectedSeoId('');setShowAdv(false);}
      else toast(data.error||'Lỗi','error');
    } catch {toast('Lỗi kết nối','error');}
    finally {setLoading(false);}
  };

  return (
    <div className="view-section fade-in">
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <div className="card">
          <div className="card-header"><div className="card-title"><Icon name="link" size={16} color="var(--yellow-dark)"/>Rút gọn URL mới</div></div>
          <div className="card-body">
            <div className="form-group"><label className="form-label">URL cần rút gọn *</label><input className="form-input" type="url" placeholder="https://example.com/..." value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
            <div className="form-group">
              <label className="form-label">Alias tùy chỉnh</label>
              <div className="input-group"><div className="form-prefix">{YOUR_DOMAIN}/</div><input className="form-input" placeholder="my-link" maxLength={20} value={alias} onChange={e=>setAlias(e.target.value)}/></div>
              <div className="form-hint">Tùy chọn — chữ, số, gạch ngang, tối đa 20 ký tự</div>
            </div>
            <button onClick={()=>setShowAdv(!showAdv)} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--gray-500)',background:'none',border:'none',cursor:'pointer',padding:'4px 0',marginBottom:16,fontFamily:'DM Sans,sans-serif'}}>
              <Icon name={showAdv?'close':'lock'} size={14}/>{showAdv?'Ẩn tùy chọn nâng cao':'Tùy chọn nâng cao (hết hạn, mật khẩu)'}
            </button>
            {showAdv&&<div style={{background:'var(--gray-50)',border:'1px solid var(--gray-200)',borderRadius:10,padding:16,marginBottom:18}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <div className="form-group" style={{marginBottom:0}}>
                  <label className="form-label"><Icon name="clock" size={13} style={{verticalAlign:-2,marginRight:4}}/>Ngày hết hạn</label>
                  <input className="form-input" type="date" value={expiry} min={new Date().toISOString().split('T')[0]} onChange={e=>setExpiry(e.target.value)}/>
                  <div className="form-hint">Để trống = không hết hạn</div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label className="form-label"><Icon name="lock" size={13} style={{verticalAlign:-2,marginRight:4}}/>Mật khẩu bảo vệ</label>
                  <input className="form-input" type="password" placeholder="Để trống = không cần" value={password} onChange={e=>setPassword(e.target.value)}/>
                </div>
              </div>
            </div>}
            
            {/* SEO Config Dropdown */}
            <div className="form-group" style={{ marginTop: 16, marginBottom: 16 }}>
              <label className="form-label"><Icon name="image" size={13} style={{ verticalAlign: -2, marginRight: 4 }}/>SEO Config (Meta tags khi share)</label>
              <select className="form-input" value={selectedSeoId} onChange={e => setSelectedSeoId(e.target.value)}>
                <option value="">-- Không sử dụng --</option>
                {seoConfigs.map(cfg => (
                  <option key={cfg.id} value={cfg.id}>{cfg.name}</option>
                ))}
              </select>
              <div className="form-hint">Chọn config để thêm meta tags OG/Twitter khi share link lên Facebook, Twitter...</div>
            </div>
            
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:14,fontSize:15}} onClick={handle} disabled={loading}>
              {loading?<><div className="spinner" style={{width:18,height:18,borderWidth:2}}/>Đang tạo...</>:<><Icon name="link" size={16}/>Rút gọn ngay</>}
            </button>
            {result&&<div className="result-box">
              <span style={{fontSize:13,fontWeight:600,color:'#92400E'}}><Icon name="check" size={14} style={{verticalAlign:-2}}/> Link đã tạo thành công</span>
              <div className="result-url">
                <input readOnly value={result} style={{flex:1,padding:'9px 13px',background:'white',border:'1.5px solid var(--gray-200)',borderRadius:8,fontSize:13,fontFamily:'DM Mono,monospace',color:'var(--gray-800)',outline:'none'}}/>
                <button className="btn btn-primary btn-sm" onClick={()=>{copyText(result);toast('Đã sao chép!')}}><Icon name="copy" size={14}/> Copy</button>
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== LINKS VIEW ====================
const LinksView = ({ auth, userRole, currentUsername }) => {
  const [links,setLinks]=useState([]);
  const [search,setSearch]=useState('');
  const [loading,setLoading]=useState(true);
  const [qrCode,setQrCode]=useState(null);
  const [utmCode,setUtmCode]=useState(null);
  const [editLink,setEditLink]=useState(null);
  const [sortBy,setSortBy]=useState('created_at');
  const [sortDir,setSortDir]=useState('desc');

  const fetchLinks = useCallback(async () => {
    setLoading(true);
    try {
      const res=await fetch(`${WORKER_URL}/links`,{headers:{Authorization:auth}});
      setLinks(await res.json());
    } catch {toast('Lỗi tải link','error');}
    finally {setLoading(false);}
  },[auth]);

  useEffect(()=>{fetchLinks();},[fetchLinks]);

  const filtered = useMemo(()=>{
    let arr=links.filter(l=>!search||l.code.toLowerCase().includes(search.toLowerCase())||l.original_url.toLowerCase().includes(search.toLowerCase()));
    arr=[...arr].sort((a,b)=>{
      let va=a[sortBy],vb=b[sortBy];
      if(sortBy==='clicks'){va=va||0;vb=vb||0;}
      return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
    });
    return arr;
  },[links,search,sortBy,sortDir]);

  const handleDelete = async (code) => {
    const res=await confirmDialog('Xóa link?',`Xóa /${code}? Không thể hoàn tác.`,'Xóa');
    if(!res.isConfirmed)return;
    try {
      const r=await fetch(`${WORKER_URL}/delete/${code}`,{method:'DELETE',headers:{Authorization:auth}});
      if(r.ok){toast(`Đã xóa /${code}`);fetchLinks();}
      else {const d=await r.json();toast(d.error||'Lỗi','error');}
    } catch {toast('Lỗi kết nối','error');}
  };

  const exportExcel = () => {
    if(!window.XLSX){toast('Chưa tải thư viện Excel','error');return;}
    const ws=window.XLSX.utils.json_to_sheet(links.map(l=>({
      'Short Code':l.code,'Short URL':`https://${YOUR_DOMAIN}/${l.code}`,'Original URL':l.original_url,
      'Clicks':l.clicks||0,'Status':isExpired(l.expiry_date)?'Hết hạn':'Active',
      'Expiry':l.expiry_date||'-','Has Password':l.has_password?'Yes':'No',
      'Created By':l.created_by,'Created At':formatDate(l.created_at)
    })));
    const wb=window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb,ws,'Links');
    window.XLSX.writeFile(wb,`links-${new Date().toISOString().split('T')[0]}.xlsx`);
    toast('Đã xuất Excel!');
  };

  const toggleLinkPublic = async (code, currentStatus) => {
    try {
      const res = await fetch(`${WORKER_URL}/link/${code}/toggle-public`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: auth },
        body: JSON.stringify({ is_public: !currentStatus })
      });
      if (res.ok) {
        toast(!currentStatus ? 'Đã chuyển sang Public' : 'Đã chuyển sang Private');
        fetchLinks();
      } else {
        toast('Không có quyền', 'error');
      }
    } catch { toast('Lỗi kết nối', 'error'); }
  };

  const sortClick=(col)=>{setSortBy(col);setSortDir(sortBy===col&&sortDir==='desc'?'asc':'desc');};
  const sortInd=(col)=>sortBy===col?(sortDir==='desc'?' ↓':' ↑'):'';

  return (
    <div className="view-section fade-in">
      {qrCode&&<QRModal code={qrCode} onClose={()=>setQrCode(null)}/>}
      {utmCode&&<UTMModal code={utmCode} onClose={()=>setUtmCode(null)}/>}
      {editLink&&<EditLinkModal link={editLink} auth={auth} userRole={userRole} currentUsername={currentUsername} onClose={()=>setEditLink(null)} onSaved={fetchLinks}/>}
      <div className="card">
        <div className="card-header">
          <div style={{display:'flex',alignItems:'center',gap:12,flex:1}}>
            <div style={{position:'relative',width:280}}>
              <Icon name="search" size={15} color="var(--gray-400)" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)'}}/>
              <input className="form-input" style={{paddingLeft:36,marginBottom:0}} placeholder="Tìm kiếm link..." value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <span className="badge badge-gray">{filtered.length} link</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={exportExcel}><Icon name="download" size={14}/>Excel</button>
            <button className="refresh-btn" onClick={fetchLinks}><Icon name="refresh" size={13}/>Làm mới</button>
          </div>
        </div>
        {loading?<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:48}}><div className="spinner"/></div>
        :filtered.length===0?<div className="empty-state"><Icon name="link" size={36} color="var(--gray-300)"/><p>Không có link nào{search?` khớp với "${search}"`:''}​</p></div>
        :<div className="table-wrap"><table>
          <thead><tr>
            <th>Code</th>
            <th>Short URL</th>
            <th>Destination</th>
            <th style={{cursor:'pointer'}} onClick={()=>sortClick('clicks')}>Clicks{sortInd('clicks')}</th>
            <th>Status</th>
            <th style={{cursor:'pointer'}} onClick={()=>sortClick('created_at')}>Created at{sortInd('created_at')}</th>
            <th>Owner</th>
            <th style={{ textAlign:'center' }}>View</th>
            <th style={{ textAlign:'center' }}>Actions</th>
          </tr></thead>
          <tbody>{filtered.map(link=>(
            <tr key={link.code} style={{opacity:isExpired(link.expiry_date)?0.7:1}}>
              <td><span className="code-chip">{link.code}</span></td>
              <td><a href={`https://${YOUR_DOMAIN}/${link.code}`} target="_blank" style={{color:'var(--yellow-dark)',fontFamily:'DM Mono,monospace',fontSize:12.5,textDecoration:'none',display:'flex',alignItems:'center',gap:4}}>{YOUR_DOMAIN}/{link.code} <Icon name="external" size={12}/></a></td>
              <td><div style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12.5,color:'var(--gray-500)'}} title={link.original_url}>{link.original_url}</div></td>
              <td><span className="badge badge-gray"><Icon name="analytics" size={11}/>{link.clicks||0}</span></td>
              <td><LinkStatusBadges link={link}/></td>
              <td style={{fontSize:12.5,color:'var(--gray-500)',whiteSpace:'nowrap'}}>{formatDate(link.created_at)}</td>
              <td style={{fontSize:12,color:'var(--gray-500)'}}>{link.created_by||'unknown'}</td>
              <td style={{textAlign:'center'}}>
                {(userRole === 'Admin' || userRole === 'SuperAdmin') ? (
                  <span 
                    className={`badge ${link.is_public ? 'badge-green' : 'badge-gray'}`}
                    onClick={() => toggleLinkPublic(link.code, link.is_public)}
                    style={{ cursor: 'pointer' }}
                    title={link.is_public ? 'Nhấn để chuyển sang Private' : 'Nhấn để chuyển sang Public'}
                  >
                    <Icon name={link.is_public ? 'globe' : 'lock'} size={12}/>
                    {link.is_public ? ' Public' : ' Private'}
                  </span>
                ) : (
                  <span className={`badge ${link.is_public ? 'badge-green' : 'badge-gray'}`}>
                    <Icon name={link.is_public ? 'globe' : 'lock'} size={12}/>
                    {link.is_public ? ' Public' : ' Private'}
                  </span>
                )}
              </td>
              <td>
                <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                  <button className="btn-icon" title="Copy" onClick={()=>{copyText(`https://${YOUR_DOMAIN}/${link.code}`);toast('Đã sao chép!')}}><Icon name="copy" size={15}/></button>
                  <button className="btn-icon" title="QR" onClick={()=>setQrCode(link.code)} style={{color:'var(--purple)'}}><Icon name="qr" size={15}/></button>
                  <button className="btn-icon" title="UTM" onClick={()=>setUtmCode(link.code)} style={{color:'var(--blue)'}}><Icon name="tag" size={15}/></button>
                  {(link.created_by===currentUsername||userRole==='Admin'||userRole==='SuperAdmin')&&(
                    <button className="btn-icon" title="Chỉnh sửa" onClick={()=>setEditLink(link)} style={{color:'var(--orange)'}}><Icon name="edit" size={15}/></button>
                  )}
                  {(link.created_by===currentUsername||userRole==='Admin'||userRole==='SuperAdmin')&&(
                    <button className="btn-icon" title="Xóa" onClick={()=>handleDelete(link.code)} style={{color:'var(--red)'}}><Icon name="trash" size={15}/></button>
                  )}
                </div>
              </td>
            </tr>
          ))}</tbody>
        </table></div>}
      </div>
    </div>
  );
};

    actionLogs:[],

    adminUsersCount:0,

  const [tab,setTab]=useState('overview');

    try {
      const res=await fetch(`${WORKER_URL}/logs`);
      setLogs(await res.json());  // Sẽ bao gồm todayStats từ API
    }
    catch {toast('Lỗi tải logs','error');}
    finally {setLoading(false);}
  },[]);

  useEffect(()=>{fetchLogs();},[fetchLogs]);
  
  const todayClicks = logs.todayStats?.clicks || 0;
  const todayActions = logs.todayStats?.actions || 0;
  const todayNewLinks = logs.todayStats?.newLinks || 0;

  const deviceStats=useMemo(()=>{
    const d={};
    (logs.clickLogs||[]).forEach(l=>{
      const ua=(l.ua||'').toLowerCase();
      const dev=ua.includes('mobile')||ua.includes('android')||ua.includes('iphone')?'Mobile':ua.includes('tablet')||ua.includes('ipad')?'Tablet':ua.length>0?'Desktop':'Unknown';
      d[dev]=(d[dev]||0)+1;
    });
    return Object.entries(d).sort((a,b)=>b[1]-a[1]);
  },[logs]);

  const geoStats=useMemo(()=>{
    const c={};
    (logs.clickLogs||[]).forEach(l=>{const co=l.country||'Unknown';c[co]=(c[co]||0)+1;});
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,8);
  },[logs]);

  const aLabel={create_link:'Tạo link',delete_link:'Xóa link',edit_link:'Sửa link',change_password:'Đổi mật khẩu',reset_password:'Reset mật khẩu',create_user:'Tạo user',delete_user:'Xóa user',toggle_status:'Thay đổi status',set_public_mode:'Chế độ xem'};
  const aColor={create_link:'badge-green',delete_link:'badge-red',edit_link:'badge-yellow',change_password:'badge-blue',reset_password:'badge-orange',create_user:'badge-purple',delete_user:'badge-red'};

  return (
    <div className="view-section fade-in">
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {[
          {label:'Clicks hôm nay',value:todayClicks,color:'var(--yellow-dark)'},
          {label:'Link tạo hôm nay',value:todayNewLinks,color:'var(--blue)'},
          {label:'Hành động hôm nay',value:todayActions,color:'var(--green)'},
          {label:'Tổng tài khoản',value:logs.adminUsersCount||0,color:'var(--purple)'},
        ].map((s,i)=>(
          <div key={i} className="card" style={{padding:18}}>
            <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:6}}>{s.label}</div>
            <div style={{fontSize:28,fontWeight:700,color:s.color}}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:16}}><div className="tab-group">
        {[['overview','Tổng quan'],['clicks','Click logs'],['actions','Action logs']].map(([k,v])=>(
          <button key={k} className={`tab-btn ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{v}</button>
        ))}
      </div></div>
      {loading?<div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div>
      :tab==='overview'?(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div className="card">
            <div className="card-header"><div className="card-title"><Icon name="globe" size={15} color="var(--blue)"/>Thiết bị truy cập</div></div>
            <div className="card-body">
              {deviceStats.length===0?<div className="empty-state" style={{padding:'24px 0'}}><p style={{fontSize:13}}>Chưa có dữ liệu<br/><span style={{fontSize:11,color:'var(--gray-400)'}}>Deploy worker mới để bắt đầu thu thập</span></p></div>
              :deviceStats.map(([dev,cnt],i)=>{
                const total=deviceStats.reduce((s,[,c])=>s+c,0);
                const pct=total>0?Math.round((cnt/total)*100):0;
                const cols=['var(--yellow)','var(--blue)','var(--green)','var(--purple)'];
                return <div key={i} style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}><span style={{fontWeight:500}}>{dev}</span><span style={{color:'var(--gray-500)'}}>{cnt} ({pct}%)</span></div>
                  <div className="progress-wrap"><div className="progress-bar" style={{width:`${pct}%`,background:cols[i%cols.length]}}/></div>
                </div>;
              })}
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title"><Icon name="globe" size={15} color="var(--green)"/>Vị trí địa lý</div></div>
            <div className="card-body">
              {geoStats.length===0?<div className="empty-state" style={{padding:'24px 0'}}><p style={{fontSize:13}}>Chưa có dữ liệu<br/><span style={{fontSize:11,color:'var(--gray-400)'}}>Deploy worker mới để bắt đầu thu thập</span></p></div>
              :geoStats.map(([co,cnt],i)=>{
                const total=geoStats.reduce((s,[,c])=>s+c,0);
                const pct=total>0?Math.round((cnt/total)*100):0;
                return <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,fontSize:13}}>
                  <span style={{width:80,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{co}</span>
                  <div style={{flex:1}}><div className="progress-wrap"><div className="progress-bar" style={{width:`${pct}%`,background:'var(--green)'}}/></div></div>
                  <span style={{width:36,textAlign:'right',color:'var(--gray-500)'}}>{cnt}</span>
                </div>;
              })}
            </div>
          </div>
        </div>
      ):tab==='clicks'?(
        <div className="card">
          <div className="card-header"><div className="card-title"><Icon name="chart" size={15} color="var(--yellow-dark)"/>Click logs ({(logs.clickLogs||[]).length})</div><button className="refresh-btn" onClick={fetchLogs}><Icon name="refresh" size={13}/>Làm mới</button></div>
          <div className="table-wrap"><table>
            <thead><tr><th>Thời gian</th><th>IP</th><th>Tên</th><th>Link</th><th>UTM</th><th>Country</th><th>Đích đến</th></tr></thead>
            <tbody>{(logs.clickLogs||[]).length===0?<tr><td colSpan={7} style={{textAlign:'center',padding:32,color:'var(--gray-400)'}}>Chưa có log</td></tr>
            :(logs.clickLogs||[]).map((l,i)=>(
              <tr key={i}>
                <td style={{fontSize:12,fontFamily:'DM Mono,monospace',whiteSpace:'nowrap'}}>{l.time}</td>
                <td style={{fontSize:12,fontFamily:'DM Mono,monospace'}}>{l.ip}</td>
                <td style={{fontSize:13}}>{l.user&&l.user!=='unknown'?l.user:<span style={{color:'var(--gray-400)',fontSize:12}}>—</span>}</td>
                <td><a href={`https://${YOUR_DOMAIN}/${l.code}`} target="_blank" className="code-chip" style={{textDecoration:'none'}}>/{l.code}</a></td>
                <td><span className="badge badge-yellow">{l.utm||'Direct'}</span></td>
                <td style={{fontSize:12}}>{l.country&&l.country!=='Unknown'?l.country:<span style={{color:'var(--gray-400)'}}>—</span>}</td>
                <td style={{fontSize:12,color:'var(--gray-500)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.target}</td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      ):(
        <div className="card">
          <div className="card-header"><div className="card-title"><Icon name="logs" size={15} color="var(--purple)"/>Action logs ({(logs.actionLogs||[]).length})</div><button className="refresh-btn" onClick={fetchLogs}><Icon name="refresh" size={13}/>Làm mới</button></div>
          <div className="table-wrap"><table>
            <thead><tr><th>Thời gian</th><th>IP</th><th>Người dùng</th><th>Hành động</th><th>Chi tiết</th></tr></thead>
            <tbody>{(logs.actionLogs||[]).length===0?<tr><td colSpan={5} style={{textAlign:'center',padding:32,color:'var(--gray-400)'}}>Chưa có log</td></tr>
            :(logs.actionLogs||[]).map((l,i)=>{
              let detail='';
              if(l.details?.code)detail=`/${l.details.code}`;
              if(l.details?.url)detail+=` → ${l.details.url.substring(0,40)}...`;
              if(l.details?.username)detail=l.details.username;
              return <tr key={i}>
                <td style={{fontSize:12,fontFamily:'DM Mono,monospace',whiteSpace:'nowrap'}}>{l.time}</td>
                <td style={{fontSize:12,fontFamily:'DM Mono,monospace'}}>{l.ip}</td>
                <td>{l.user||<span style={{color:'var(--gray-400)',fontSize:13}}>—</span>}</td>
                <td><span className={`badge ${aColor[l.action]||'badge-gray'}`}>{aLabel[l.action]||l.action}</span></td>
                <td style={{fontSize:12,color:'var(--gray-500)'}}>{detail||'-'}</td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}
    </div>
  );
};

// ==================== ADMIN VIEW ====================
const AdminView = ({ auth, currentUser }) => {
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showModal,setShowModal]=useState(false);
  const [editingUser,setEditingUser]=useState(null);
  const [publicMode,setPublicMode]=useState(false);
  const [selLogs,setSelLogs]=useState(null);
  const [form,setForm]=useState({fullname:'',department:'',username:'',role:'Member'});

  const fetchUsers=useCallback(async()=>{
    setLoading(true);
    try{const res=await fetch(`${WORKER_URL}/admin/users`,{headers:{Authorization:auth}});if(res.status===403){toast('Không có quyền','error');return;}setUsers(await res.json());}
    catch{toast('Lỗi tải users','error');}finally{setLoading(false);}
  },[auth]);
  const fetchPublicMode=useCallback(async()=>{
    try{const res=await fetch(`${WORKER_URL}/admin/settings/public`,{headers:{Authorization:auth}});const d=await res.json();setPublicMode(d.enabled);}catch{}
  },[auth]);
  useEffect(()=>{fetchUsers();fetchPublicMode();},[fetchUsers,fetchPublicMode]);

  const saveUser=async()=>{
    if(!form.username){toast('Nhập username','error');return;}
    try{
      const method=editingUser?'PUT':'POST';
      const url=editingUser?`${WORKER_URL}/admin/users/${editingUser.username}`:`${WORKER_URL}/admin/users`;
      const res=await fetch(url,{method,headers:{'Content-Type':'application/json',Authorization:auth},body:JSON.stringify(form)});
      if(res.ok){toast(editingUser?'Cập nhật thành công':`Tạo user "${form.username}" thành công! Mật khẩu = username, phải đổi khi đăng nhập lần đầu.`,'success',4000);fetchUsers();setShowModal(false);setEditingUser(null);setForm({fullname:'',department:'',username:'',role:'Member'});}
      else{const e=await res.json();toast(e.error||'Lỗi','error');}
    }catch{toast('Lỗi kết nối','error');}
  };

  const resetPw=async(username)=>{
    const r=await Swal.fire({title:'Reset mật khẩu?',text:`Mật khẩu mới = "${username}". User phải đổi khi đăng nhập lại.`,icon:'warning',showCancelButton:true,confirmButtonColor:'#FFC107',cancelButtonText:'Hủy',confirmButtonText:'Reset'});
    if(!r.isConfirmed)return;
    try{const res=await fetch(`${WORKER_URL}/admin/users/${username}/reset-password`,{method:'POST',headers:{Authorization:auth}});if(res.ok)toast(`Đã reset. Mật khẩu mới = "${username}"`);}
    catch{toast('Lỗi','error');}
  };

  const toggleStatus=async(username)=>{
    try{const res=await fetch(`${WORKER_URL}/admin/users/${username}/toggle-status`,{method:'POST',headers:{Authorization:auth}});if(res.ok){toast('Đã thay đổi trạng thái');fetchUsers();}}
    catch{toast('Lỗi','error');}
  };

  const deleteUser=async(username)=>{
    const r=await Swal.fire({title:'Xóa user?',text:`Xóa "${username}"? Không thể hoàn tác.`,icon:'error',showCancelButton:true,confirmButtonColor:'#EF4444',cancelButtonText:'Hủy',confirmButtonText:'Xóa'});
    if(!r.isConfirmed)return;
    try{const res=await fetch(`${WORKER_URL}/admin/users/${username}`,{method:'DELETE',headers:{Authorization:auth}});if(res.ok){toast('Đã xóa user');fetchUsers();}}
    catch{toast('Lỗi','error');}
  };

  const viewLogs=async(username)=>{
    try{const res=await fetch(`${WORKER_URL}/admin/logs/${username}`,{headers:{Authorization:auth}});setSelLogs({username,logs:await res.json()});}
    catch{toast('Lỗi tải logs','error');}
  };

  const togglePM=async()=>{
    try{const res=await fetch(`${WORKER_URL}/admin/settings/public`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:auth},body:JSON.stringify({enabled:!publicMode})});if(res.ok){setPublicMode(!publicMode);toast(publicMode?'Đã chuyển Private Mode':'Đã chuyển Public Mode');}}
    catch{toast('Lỗi','error');}
  };

  const roleColor={SuperAdmin:'badge-purple',Admin:'badge-blue',Member:'badge-gray'};

  return (
    <div className="view-section fade-in">
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header"><div className="card-title"><Icon name="globe" size={16} color="var(--yellow-dark)"/>Chế độ xem link</div><button className={`btn ${publicMode?'btn-primary':'btn-secondary'}`} onClick={togglePM}><Icon name={publicMode?'check':'lock'} size={14}/>{publicMode?'Public Mode':'Private Mode'}</button></div>
        <div className="card-body"><div style={{fontSize:13,color:'var(--gray-500)'}}>{publicMode?'Tất cả thành viên xem được link được đánh dấu public.':'Mỗi thành viên chỉ xem link mình tạo.'}</div></div>
      </div>
      <div className="card">
        <div className="card-header"><div className="card-title"><Icon name="user" size={16} color="var(--purple)"/>Quản lý tài khoản</div><button className="btn btn-primary btn-sm" onClick={()=>{setEditingUser(null);setForm({fullname:'',department:'',username:'',role:'Member'});setShowModal(true);}}><Icon name="user" size={14}/> Thêm user</button></div>
        {loading?<div style={{padding:40,textAlign:'center'}}><div className="spinner"/></div>
        :<div className="table-wrap"><table>
          <thead><tr><th>Full Name</th><th>Department</th><th>Username</th><th>Role</th><th>Status</th><th>Password</th><th>Created at</th><th>Actions</th></tr></thead>
          <tbody>{users.map(u=>(
            <tr key={u.username} style={{opacity:u.status==='disabled'?.5:1}}>
              <td style={{fontWeight:500}}>{u.fullname||'-'}</td>
              <td style={{fontSize:12.5,color:'var(--gray-500)'}}>{u.department||'-'}</td>
              <td><span className="code-chip">{u.username}</span></td>
              <td><span className={`badge ${roleColor[u.role]||'badge-gray'}`}>{u.role}</span></td>
              <td><span className={`badge ${u.status==='active'?'badge-green':'badge-red'}`}>{u.status==='active'?'Active':'Disabled'}</span></td>
              <td>{u.must_change_password?<span className="badge badge-orange"><Icon name="lock" size={11}/>Cần đổi</span>:<span className="badge badge-green"><Icon name="check" size={11}/>OK</span>}</td>
              <td style={{fontSize:12}}>{formatDate(u.created_at)}</td>
              <td><div style={{display:'flex',gap:5}}>
                <button className="btn-icon" title="Sửa" onClick={()=>{setEditingUser(u);setForm({fullname:u.fullname||'',department:u.department||'',username:u.username,role:u.role});setShowModal(true);}}><Icon name="edit" size={14}/></button>
                <button className="btn-icon" title="Reset mật khẩu" onClick={()=>resetPw(u.username)}><Icon name="key" size={14}/></button>
                <button className="btn-icon" title={u.status==='active'?'Disable':'Enable'} onClick={()=>toggleStatus(u.username)}><Icon name={u.status==='active'?'close':'check'} size={14}/></button>
                <button className="btn-icon" title="Logs" onClick={()=>viewLogs(u.username)}><Icon name="logs" size={14}/></button>
                {u.username!=='superadmin'&&<button className="btn-icon" title="Xóa" onClick={()=>deleteUser(u.username)} style={{color:'var(--red)'}}><Icon name="trash" size={14}/></button>}
              </div></td>
            </tr>
          ))}</tbody>
        </table></div>}
      </div>

      {showModal&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header"><div className="modal-title">{editingUser?'Sửa user':'Thêm user mới'}</div><button className="btn-icon" onClick={()=>setShowModal(false)}><Icon name="close" size={18}/></button></div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" value={form.fullname} onChange={e=>setForm({...form,fullname:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Department</label><input className="form-input" value={form.department} onChange={e=>setForm({...form,department:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Username</label><input className="form-input" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} disabled={!!editingUser}/></div>
              <div className="form-group"><label className="form-label">Role</label><select className="form-input" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}><option value="Member">Member</option><option value="Admin">Admin</option>{currentUser?.role==='SuperAdmin'&&<option value="SuperAdmin">SuperAdmin</option>}</select></div>
              {!editingUser&&<div style={{background:'var(--yellow-light)',border:'1px solid var(--yellow-mid)',borderRadius:8,padding:'10px 14px',fontSize:12.5,color:'#92400E'}}>🔐 Mật khẩu mặc định = username. User phải đổi khi đăng nhập lần đầu.</div>}
            </div>
            <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Hủy</button><button className="btn btn-primary" onClick={saveUser}>Lưu</button></div>
          </div>
        </div>
      )}

      {selLogs&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setSelLogs(null)}>
          <div className="modal" style={{maxWidth:600}}>
            <div className="modal-header"><div className="modal-title">Logs của {selLogs.username}</div><button className="btn-icon" onClick={()=>setSelLogs(null)}><Icon name="close" size={18}/></button></div>
            <div className="modal-body">{selLogs.logs.length===0?<div className="empty-state"><p>Chưa có logs</p></div>:<div style={{maxHeight:400,overflowY:'auto'}}>{selLogs.logs.map((l,i)=>(
              <div key={i} style={{padding:'8px 0',borderBottom:'1px solid var(--gray-100)',fontSize:12}}>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--gray-500)'}}>{l.time}</div>
                <div><span className="badge badge-gray">{l.action}</span>{l.details?.code&&` /${l.details.code}`}{l.details?.username&&` ${l.details.username}`}</div>
              </div>
            ))}</div>}</div>
          </div>
        </div>
      )}
    </div>
  );
};

// ==================== SEO VIEW ====================
const SEOView = ({ auth }) => {
  const [configs, setConfigs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({
    name: '', title: '', description: '', keywords: '', ogImage: '', twitterCard: 'summary_large_image'
  });

  const fetchConfigs = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`${WORKER_URL}/admin/seo-configs`, { headers: { Authorization: auth } });
      if (res.ok) setConfigs(await res.json());
      else toast('Không thể tải config', 'error');
    } catch { toast('Lỗi kết nối', 'error'); }
    finally { setLoading(false); }
  }, [auth]);

  useEffect(() => { fetchConfigs(); }, [fetchConfigs]);

  const saveConfig = async () => {
    if (!form.name) { toast('Vui lòng nhập tên config', 'error'); return; }
    try {
      const url = editing ? `${WORKER_URL}/admin/seo-configs/${editing.id}` : `${WORKER_URL}/admin/seo-configs`;
      const method = editing ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json', Authorization: auth },
        body: JSON.stringify(form)
      });
      if (res.ok) {
        toast(editing ? 'Cập nhật thành công' : 'Tạo config thành công');
        fetchConfigs();
        setShowModal(false);
        setEditing(null);
        setForm({ name: '', title: '', description: '', keywords: '', ogImage: '', twitterCard: 'summary_large_image' });
      } else toast('Lỗi lưu config', 'error');
    } catch { toast('Lỗi kết nối', 'error'); }
  };

  const deleteConfig = async (id, name) => {
    const confirmed = await confirmDialog('Xóa config?', `Xóa "${name}"?`, 'Xóa');
    if (!confirmed.isConfirmed) return;
    try {
      const res = await fetch(`${WORKER_URL}/admin/seo-configs/${id}`, { method: 'DELETE', headers: { Authorization: auth } });
      if (res.ok) { toast('Đã xóa'); fetchConfigs(); }
      else toast('Lỗi xóa', 'error');
    } catch { toast('Lỗi kết nối', 'error'); }
  };

  const editConfig = (cfg) => {
    setEditing(cfg);
    setForm({
      name: cfg.name || '',
      title: cfg.title || '',
      description: cfg.description || '',
      keywords: cfg.keywords || '',
      ogImage: cfg.ogImage || '',
      twitterCard: cfg.twitterCard || 'summary_large_image'
    });
    setShowModal(true);
  };

  return (
    <div className="view-section fade-in">
      <div className="card">
        <div className="card-header">
          <div className="card-title"><Icon name="tag" size={16} color="var(--yellow-dark)"/>Quản lý SEO Config</div>
          <button className="btn btn-primary btn-sm" onClick={() => { setEditing(null); setForm({ name: '', title: '', description: '', keywords: '', ogImage: '', twitterCard: 'summary_large_image' }); setShowModal(true); }}>
            <Icon name="plus" size={14}/> Thêm config
          </button>
        </div>
        {loading ? <div style={{ padding: 40, textAlign: 'center' }}><div className="spinner"/></div>
          : configs.length === 0 ? <div className="empty-state"><p>Chưa có SEO config nào</p></div>
            : <div className="table-wrap">
                <table>
                  <thead><tr><th>Tên</th><th>OG Title</th><th>OG Description</th><th>Image</th><th style={{ textAlign: 'center' }}>Actions</th></tr></thead>
                  <tbody>
                    {configs.map(cfg => (
                      <tr key={cfg.id}>
                        <td><span className="badge badge-purple">{cfg.name}</span></td>
                        <td style={{ maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{cfg.title || '—'}</td>
                        <td style={{ maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{cfg.description || '—'}</td>
                        <td>{cfg.ogImage ? <span className="badge badge-green">✓ Có ảnh</span> : <span className="badge badge-gray">—</span>}</td>
                        <td style={{ textAlign: 'center' }}>
                          <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
                            <button className="btn-icon" title="Sửa" onClick={() => editConfig(cfg)}><Icon name="edit" size={15}/></button>
                            <button className="btn-icon" title="Xóa" onClick={() => deleteConfig(cfg.id, cfg.name)} style={{ color: 'var(--red)' }}><Icon name="trash" size={15}/></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>}
      </div>

      {showModal && (
        <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && setShowModal(false)}>
          <div className="modal" style={{ maxWidth: 550 }}>
            <div className="modal-header">
              <div className="modal-title">{editing ? 'Sửa SEO Config' : 'Thêm SEO Config mới'}</div>
              <button className="btn-icon" onClick={() => setShowModal(false)}><Icon name="close" size={18}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Tên config *</label><input className="form-input" placeholder="VD: Facebook Sharing" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}/></div>
              <div className="form-group"><label className="form-label">OG Title (Meta Title)</label><input className="form-input" placeholder="Tiêu đề khi share lên mạng xã hội" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })}/></div>
              <div className="form-group"><label className="form-label">OG Description</label><textarea className="form-input" rows="2" placeholder="Mô tả ngắn gọn" value={form.description} onChange={e => setForm({ ...form, description: e.target.value })}/></div>
              <div className="form-group"><label className="form-label">Keywords (cách nhau bằng dấu phẩy)</label><input className="form-input" placeholder="url, shortener, link" value={form.keywords} onChange={e => setForm({ ...form, keywords: e.target.value })}/></div>
              <div className="form-group"><label className="form-label">OG Image URL</label><input className="form-input" placeholder="https://example.com/image.jpg" value={form.ogImage} onChange={e => setForm({ ...form, ogImage: e.target.value })}/><div className="form-hint">Nên dùng ảnh 1200x630px</div></div>
              <div className="form-group"><label className="form-label">Twitter Card</label><select className="form-input" value={form.twitterCard} onChange={e => setForm({ ...form, twitterCard: e.target.value })}><option value="summary">summary</option><option value="summary_large_image">summary_large_image</option></select></div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Hủy</button>
              <button className="btn btn-primary" onClick={saveConfig}>Lưu</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};
  
const App = () => {
  const [auth,setAuth]=useState(()=>sessionStorage.getItem('adminAuth'));
  const [adminUser,setAdminUser]=useState(()=>sessionStorage.getItem('adminUser')||'');
  const [userRole,setUserRole]=useState(()=>sessionStorage.getItem('userRole')||'Member');
  const [currentUserInfo,setCurrentUserInfo]=useState(null);
  const [mustChangePw,setMustChangePw]=useState(false);
  const [tab,setTab]=useState('dashboard');
  const [userFullname,setUserFullname]=useState(()=>localStorage.getItem('userFullname')||'');
  const [showChangePw,setShowChangePw]=useState(false);

  const handleLogin=(a,u,ud)=>{
    setAuth(a);setAdminUser(u);setCurrentUserInfo(ud);
    setUserRole(ud?.role||'Member');
    if(ud?.fullname){setUserFullname(ud.fullname);localStorage.setItem('userFullname',ud.fullname);}
    setMustChangePw(ud?.must_change_password===true);
    sessionStorage.setItem('adminAuth',a);
    sessionStorage.setItem('adminUser',u);
    sessionStorage.setItem('userRole',ud?.role||'Member');
  };

  const handleLogout=()=>{
    sessionStorage.removeItem('adminAuth');sessionStorage.removeItem('adminUser');sessionStorage.removeItem('userRole');
    setAuth(null);setAdminUser('');setUserRole('Member');setUserFullname('');setMustChangePw(false);
    localStorage.removeItem('userFullname');
  };

  const handlePwChanged=()=>{
    setMustChangePw(false);
    toast('Mật khẩu đã cập nhật. Vui lòng đăng nhập lại.','success',3000);
    setTimeout(()=>handleLogout(),2000);
  };

  if (!auth) return <AuthScreen onLogin={handleLogin}/>;
  if (mustChangePw) return <ForceChangePasswordScreen auth={auth} username={adminUser} onSuccess={handlePwChanged}/>;

  const navItems=[
    {key:'dashboard',label:'Dashboard',icon:'dashboard'},
    {key:'create',label:'Tạo link mới',icon:'link'},
    {key:'links',label:'Quản lý link',icon:'list'},
  ];
  if (userRole === 'Admin' || userRole === 'SuperAdmin') navItems.push({ key: 'analytics', label: 'Analytics & Logs', icon: 'analytics' });

  const titles={dashboard:'Tổng quan',create:'Tạo link mới',links:'Quản lý link',analytics:'Analytics & Logs',admin:'Admin Panel',seo:'SEO Configs'};
  const displayName=userFullname||adminUser||'Người dùng';
  const initials=displayName.substring(0,2).toUpperCase();

  return (
    <>
      {showChangePw&&<ChangePasswordModal auth={auth} onClose={()=>setShowChangePw(false)}/>}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <img src="/icon.png" alt="" onError={e=>e.target.style.display='none'}/>
          <div className="sidebar-logo-text"><h1>URL Shortener</h1><p>Enactus FTU Hanoi</p></div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">Menu</div>
          {navItems.map(item => (
            <a key={item.key} className={`nav-item ${tab === item.key ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); setTab(item.key); }} href="#">
              <Icon name={item.icon} size={17}/>{item.label}
            </a>
          ))}
          <div className="nav-spacer"/>
          <div className="nav-section-label">Tài khoản</div>
          {userRole === 'SuperAdmin' && (
            <a className="nav-item" onClick={(e) => { e.preventDefault(); setTab('admin'); }} href="#">
              <Icon name="user" size={17}/>Admin Panel
            </a>
          )}
          {(userRole === 'SuperAdmin' || userRole === 'Admin') && (
            <a className="nav-item" onClick={(e) => { e.preventDefault(); setTab('seo'); }} href="#">
              <Icon name="tag" size={17}/>SEO Configs
            </a>
          )}
          <a className="nav-item" href="#" onClick={e => { e.preventDefault(); setShowChangePw(true); }}>
            <Icon name="key" size={17}/>Đổi mật khẩu
          </a>
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-user" onClick={()=>{if(window.confirm('Đăng xuất?'))handleLogout();}}>
            <div className="sidebar-avatar">{initials}</div>
            <div className="sidebar-user-info"><p>{displayName}</p><span>{userRole} · Click để đăng xuất</span></div>
          </div>
        </div>
      </aside>
      <main className="main">
        <header className="topbar">
          <div className="topbar-title">{titles[tab]}</div>
          <div className="topbar-meta">
            <div className="topbar-badge"><span className="dot"/><span style={{fontFamily:'DM Mono,monospace',fontSize:12}}>{YOUR_DOMAIN}</span></div>
            <div style={{fontSize:13,color:'var(--gray-500)'}}>{new Date().toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}</div>
          </div>
        </header>
        <div className="content" style={{position:'relative'}}>
          {tab==='dashboard'&&<DashboardView auth={auth}/>}
          {tab==='create'&&<CreateLinkView auth={auth}/>}
          {tab==='links'&&<LinksView auth={auth} userRole={userRole} currentUsername={adminUser}/>}
          {tab==='analytics'&&<AnalyticsView/>}
          {tab==='admin'&&<AdminView auth={auth} currentUser={currentUserInfo}/>}
          {tab==='seo'&&(<SEOView auth={auth}/>)}
        </div>
      </main>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
